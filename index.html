<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Menú - Fast Food Vargas</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #121212; color: #e0e0e0; margin: 0; padding: 10px; padding-bottom: 50px; }
        h1 { color: #ffcc00; margin-top: 20px; font-size: 1.8em; }
        .instrucciones { color: #aaaaaa; font-size: 0.9em; margin-bottom: 20px; }
        
        .my-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 10px; max-width: 800px; margin: 0 auto; }
        .my-gallery a { display: block; background: #1e1e1e; padding: 5px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: transform 0.2s; text-decoration: none; }
        .my-gallery a:active { transform: scale(0.95); }
        .my-gallery img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; display: block; }
        
        .btn-whatsapp { position: fixed; bottom: 20px; right: 20px; background-color: #25D366; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <h1>🍔 Fast Food Vargas 🍟</h1>

        </a>

        <a href="https://i.ibb.co/QvQLjyhY/image.jpg" data-pswp-width="1000" data-pswp-height="1000" target="_blank">

    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe-lightbox.min.js';
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#gallery',
            children: 'a',
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.js')
        });
        lightbox.init();
